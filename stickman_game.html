<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>火柴人大战小游戏</title>
<style>
  body { margin: 0; background: #111; color: #eee; font-family: sans-serif; }
  #gameCanvas { background: #222; display: block; margin: auto; }
  #hud { text-align: center; margin: 10px; }
  button { margin: 2px; padding: 8px 12px; font-size: 16px; }
</style>
</head>
<body>
  <div id="hud">
    <button onclick="changeWeapon(0)">拳头</button>
    <button onclick="changeWeapon(1)">剑</button>
    <button onclick="changeWeapon(2)">弓箭</button>
    <button onclick="changeWeapon(3)">火球</button>
    <div>当前武器：<span id="weaponName">拳头</span></div>
  </div>
  <canvas id="gameCanvas" width="320" height="480"></canvas>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const weapons = ['拳头', '剑', '弓箭', '火球'];
    let currentWeapon = 0;

    function changeWeapon(index){
      currentWeapon = index;
      document.getElementById('weaponName').textContent = weapons[index];
    }

    // Fire a simple "attack" animation
    function attack(){
      ctx.clearRect(0,0,canvas.width,canvas.height);
      ctx.fillStyle = '#eee';
      ctx.font = '20px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('你用 '+weapons[currentWeapon]+' 攻击！', canvas.width/2, canvas.height/2);
    }

    document.body.addEventListener('click', attack);

    // Initial draw
    ctx.fillStyle = '#eee';
    ctx.font = '20px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('点击画面攻击', canvas.width/2, canvas.height/2);
  </script>
</body>
</html>
